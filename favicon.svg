<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro redondeado -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Sección de hormigón (relleno azul oscuro + borde gris) -->
  <rect x="4" y="6" width="24" height="20" rx="1"
    fill="rgba(30,58,100,0.45)" stroke="#4e6880" stroke-width="1.4"/>

  <!-- Estribo interior discontinuo -->
  <rect x="7" y="9" width="18" height="14" rx="0.5"
    fill="none" stroke="#37506a" stroke-width="0.85" stroke-dasharray="3 2"/>

  <!-- Barras de tracción — cyan #38bdf8 -->
  <circle cx="10.5" cy="22.5" r="2"   fill="#38bdf8"/>
  <circle cx="16"   cy="22.5" r="2"   fill="#38bdf8"/>
  <circle cx="21.5" cy="22.5" r="2"   fill="#38bdf8"/>

  <!-- Barras de compresión — azul más suave -->
  <circle cx="11"   cy="10"   r="1.4" fill="#7dd3fc"/>
  <circle cx="21"   cy="10"   r="1.4" fill="#7dd3fc"/>
</svg>
